# managed-by: codex-github-maintenance
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      dependency-updates:
        patterns:
          - "*"
    labels:
      - "dependencies"
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      dependency-updates:
        patterns:
          - "*"
    labels:
      - "dependencies"
